<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>離線標記工具 - 教師時數審核</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      margin: 0;
      padding: 20px;
      background: #f5f5f7;
      display: flex;
      justify-content: center;
    }
    .container {
      max-width: 960px;
      width: 100%;
      background: #ffffff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    }
    h1 {
      margin-top: 0;
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 12px;
    }
    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #666;
      margin-bottom: 20px;
    }
    .top-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .file-input-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }
    input[type="file"] {
      font-size: 13px;
    }
    .status-pill {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: #f0f0f5;
      color: #555;
    }
    .status-pill strong {
      color: #111827;
    }
    .progress-bar {
      position: relative;
      width: 100%;
      height: 8px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .progress-fill {
      position: absolute;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #10b981, #22c55e);
      transition: width 0.2s ease-out;
    }
    .card {
      border-radius: 14px;
      border: 1px solid #e5e7eb;
      padding: 16px 18px;
      margin-bottom: 16px;
      background: #fafafa;
    }
    .card-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 6px 12px;
      font-size: 13px;
      color: #444;
    }
    .meta-label {
      color: #6b7280;
      font-size: 12px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
    }
    .badge-ai-pass {
      background: #ecfdf3;
      color: #15803d;
      border: 1px solid #bbf7d0;
    }
    .badge-ai-fail {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }
    .badge-unlabeled {
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
    }
    textarea {
      width: 100%;
      min-height: 80px;
      resize: vertical;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      padding: 8px 10px;
      font-size: 13px;
      line-height: 1.5;
    }
    textarea:focus,
    input[type="text"]:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 1px #2563eb22;
    }
    .field-label {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .field-label .required {
      color: #dc2626;
    }
    .radio-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 14px;
    }
    .radio-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid #d1d5db;
      cursor: pointer;
      user-select: none;
      font-size: 13px;
    }
    .radio-chip input {
      margin: 0;
    }
    .radio-chip.pass.selected {
      background: #ecfdf3;
      border-color: #22c55e;
    }
    .radio-chip.fail.selected {
      background: #fef2f2;
      border-color: #ef4444;
    }
    .small-input {
      width: 180px;
      border-radius: 999px;
      border: 1px solid #d1d5db;
      padding: 6px 10px;
      font-size: 13px;
    }
    .controls-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-top: 12px;
    }
    .nav-buttons,
    .export-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    button {
      border-radius: 999px;
      border: none;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #e5e7eb;
    }
    button.primary {
      background: #2563eb;
      color: white;
    }
    button.primary:disabled {
      opacity: 0.5;
      cursor: default;
    }
    button.subtle {
      background: #f3f4f6;
      color: #374151;
    }
    button.danger {
      background: #fee2e2;
      color: #b91c1c;
    }
    button:disabled {
      cursor: not-allowed;
    }
    .checkbox-inline {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: #4b5563;
    }
    .ai-feedback-text {
      font-size: 13px;
      background: #f3f4ff;
      border-radius: 10px;
      padding: 8px 10px;
      border: 1px dashed #c7d2fe;
      white-space: pre-wrap;
    }
    .footer-note {
      margin-top: 12px;
      font-size: 11px;
      color: #9ca3af;
      text-align: right;
    }
    @media (max-width: 640px) {
      body { padding: 10px; }
      .container { padding: 16px; }
      .small-input { width: 100%; }
      .top-bar { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>離線標記工具</h1>
    <div class="subtitle">載入 JSON 資料後，逐筆標記「通過 / 不通過」及理由，最後匯出檔案回傳。</div>

    <!-- 上方：載入檔案 & 狀態 -->
    <div class="top-bar">
      <div class="file-input-wrapper">
        <span>匯入待標記檔案：</span>
        <input type="file" id="fileInput" accept=".json" />
      </div>
      <div class="status-pill" id="statusInfo">
        尚未載入資料
      </div>
    </div>

    <!-- 進度條 -->
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <!-- 案件資訊卡片 -->
    <div class="card" id="caseCard" style="display:none;">
      <div class="card-title">
        <span id="caseTitle">案件資訊</span>
        <span id="labelStatus" class="badge badge-unlabeled" style="margin-left:8px;">尚未標記</span>
      </div>
      <div class="meta-grid">
        <div>
          <div class="meta-label">案件編號</div>
          <div id="caseIdText">-</div>
        </div>
        <div>
          <div class="meta-label">檔案名稱</div>
          <div id="fileNameText">-</div>
        </div>
        <div>
          <div class="meta-label">課程名稱</div>
          <div id="courseNameText">-</div>
        </div>
        <div>
          <div class="meta-label">時數 / 成績</div>
          <div id="hoursScoreText">-</div>
        </div>
        <div>
          <div class="meta-label">AI 判定</div>
          <div id="aiResultText">-</div>
        </div>
         <div>
            <div class="meta-label">原始檔案</div>
            <a id="openPdfBtn" class="subtle" href="javascript:void(0)" target="_blank" rel="noopener">開啟 PDF</a>
        </div>
      </div>

      <div style="margin-top:12px;">
        <div class="meta-label">AI 回饋說明</div>
        <div id="aiFeedbackText" class="ai-feedback-text">
          -
        </div>
      </div>
    </div>

    <!-- 標記區塊 -->
    <div class="card" id="labelCard" style="display:none;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div class="card-title" style="margin-bottom:0;">人工標記</div>
        <div style="font-size:12px;color:#6b7280;" id="recordIndexText"></div>
      </div>

      <div style="margin-bottom:12px;">
        <div class="field-label">
          標記結果 <span class="required">*</span>
        </div>
        <div class="radio-group">
          <label class="radio-chip pass" id="chipPass">
            <input type="radio" name="human_is_passed" value="pass" />
            通過
          </label>
          <label class="radio-chip fail" id="chipFail">
            <input type="radio" name="human_is_passed" value="fail" />
            不通過
          </label>
        </div>
      </div>

     <div style="margin-bottom:12px;">

    <div class="field-label">
        理由說明 <span class="required">*</span>
        <span style="font-size:11px;color:#9ca3af;">（可複選）</span>
      </div>

      <div id="reasonCheckboxGroup" style="display:flex; flex-direction:column; gap:6px; font-size:14px;">

        <label><input type="checkbox" class="reasonOption" value="課程名稱不一致"> 1. 課程名稱不一致</label>

        <label><input type="checkbox" class="reasonOption" value="開課期間不在規定時間內（需 ≥ 2025-01-01）">
          2. 開課期間不在規定時間內（需 ≥ 2025-01-01）</label>

        <label><input type="checkbox" class="reasonOption" value="認證時數不足12小時">
          3. 認證時數加總不足 12 小時</label>

        <label><input type="checkbox" class="reasonOption" value="缺少測驗成績（不能只有閱讀時數或討論度）">
          4. 缺少測驗成績（不能只有閱讀時數/討論度）</label>

        <label><input type="checkbox" class="reasonOption" value="適用對象不包含大專院校/大學生/技專校院">
          5. 適用對象不包含大專院校/大學生/技專校院</label>

        <label><input type="checkbox" class="reasonOption" value="證書姓名與學生姓名不符或缺少學生基本資料頁">
          6. 證書姓名與學生姓名不符，或缺少學生基本資料頁</label>

        <label><input type="checkbox" class="reasonOption" value="課程內容與學生「發展特色」無相符項目">
          7. 課程內容與學生所填「發展特色」不相符</label>

        <label><input type="checkbox" class="reasonOption" value="同一申請案中課程名稱重複">
          8. 同一申請案中課程名稱重複</label>
      <label>
        <input type="checkbox" class="reasonOption reasonOther" value="其他">
        9. 其他（請說明）
      </label>

      <!-- 顯示其他原因輸入框 -->
      <input
        type="text"
        id="otherReasonInput"
        placeholder="請輸入其他原因..."
        style="margin-left:20px; margin-top:4px; padding:5px 10px; border:1px solid #ccc; border-radius:6px; width:60%; display:none;"
      />

      </div>
    </div>

      <div style="margin-bottom:4px;">
        <div class="field-label">
          標記人代號 <span class="required">*</span>
        </div>
        <input type="text" id="reviewerInput" class="small-input" placeholder="例如：T01、審核A" />
      </div>

      <div style="font-size:11px;color:#6b7280;margin-top:4px;">
        註：系統將自動記錄標記日期（本機時間）。
      </div>

      <!-- 底部控制按鈕 -->
      <div class="controls-row">
        <div class="nav-buttons">
          <button id="prevBtn" class="subtle" disabled>⬅ 上一筆</button>
          <button id="nextBtn" class="subtle" disabled>下一筆 ➡</button>
          <label class="checkbox-inline">
            <input type="checkbox" id="skipLabeledCheckbox" />
            只瀏覽尚未標記
          </label>
        </div>
        <div class="export-buttons">
          <span style="font-size:12px;color:#6b7280;" id="labeledCountText">已標記 0 筆</span>
          <button id="clearCurrentBtn" class="danger">清除此筆標記</button>
          <button id="exportJsonBtn" class="primary" disabled>匯出 JSON</button>
          <button id="exportCsvBtn" class="subtle" disabled>匯出 CSV</button>
        </div>
      </div>
    </div>

    <div class="footer-note">
      本工具為純前端離線頁面，僅在您的瀏覽器中處理資料，不會上傳至任何伺服器。
    </div>
  </div>

  <script>
    // ====== 狀態變數 ======
    let data = [];               // 原始 + 標記資料
    let currentIndex = 0;        // 目前顯示的索引
    let skipLabeledOnly = false; // 是否只顯示未標記案件
    let isRendering = false;     // 防止渲染時重複綁定事件

    const fileInput = document.getElementById('fileInput');
    const statusInfo = document.getElementById('statusInfo');
    const progressFill = document.getElementById('progressFill');

    const caseCard = document.getElementById('caseCard');
    const labelCard = document.getElementById('labelCard');

    const caseTitle = document.getElementById('caseTitle');
    const labelStatus = document.getElementById('labelStatus');
    const caseIdText = document.getElementById('caseIdText');
    const fileNameText = document.getElementById('fileNameText');
    const courseNameText = document.getElementById('courseNameText');
    const hoursScoreText = document.getElementById('hoursScoreText');
    const aiResultText = document.getElementById('aiResultText');
    const aiFeedbackText = document.getElementById('aiFeedbackText');
    const recordIndexText = document.getElementById('recordIndexText');
    const labeledCountText = document.getElementById('labeledCountText');
    const reasonCheckboxGroup = document.getElementById('reasonCheckboxGroup');
    const chipPass = document.getElementById('chipPass');
    const chipFail = document.getElementById('chipFail');

    const reviewerInput = document.getElementById('reviewerInput');
    const otherReasonInput = document.getElementById('otherReasonInput');
    const skipLabeledCheckbox = document.getElementById('skipLabeledCheckbox');

    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const clearCurrentBtn = document.getElementById('clearCurrentBtn');
    const exportJsonBtn = document.getElementById('exportJsonBtn');
    const exportCsvBtn = document.getElementById('exportCsvBtn');
    const openPdfBtn = document.getElementById('openPdfBtn');

    // ====== 判斷目前是否已標記 ======
    function isLabeled(item) {
      return item.human_is_passed === 'pass' || item.human_is_passed === 'fail';
    }

    function countLabeled() {
      return data.filter(isLabeled).length;
    }

    // ====== 載入 JSON 檔案 ======
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        try {
          const json = JSON.parse(event.target.result);
          if (!Array.isArray(json)) {
            alert('JSON 格式錯誤：最外層應為陣列。');
            return;
          }
          data = json.map((item) => ({
            ...item,
            human_is_passed: item.human_is_passed ?? null,
            human_reason: item.human_reason ?? '',
            reviewer_name: item.reviewer_name ?? '',
            review_date: item.review_date ?? null,
          }));
          if (data.length === 0) {
            alert('JSON 檔案內沒有任何資料。');
            return;
          }
          currentIndex = 0;
          statusInfo.innerHTML = `已載入 <strong>${data.length}</strong> 筆案件`;
          caseCard.style.display = 'block';
          labelCard.style.display = 'block';
          exportJsonBtn.disabled = false;
          exportCsvBtn.disabled = false;
          renderCurrentRecord();
        } catch (err) {
          console.error(err);
          alert('讀取 JSON 時發生錯誤，請確認檔案格式。');
        }
      };
      reader.readAsText(file, 'utf-8');
    });

    // ====== 儲存目前表單內容到 data ======
    function saveCurrentForm() {
      if (!data || data.length === 0) return;

      const item = data[currentIndex];
      const passRadio = chipPass.querySelector('input');
      const failRadio = chipFail.querySelector('input');

      let human_is_passed = null;
      if (passRadio.checked) human_is_passed = 'pass';
      if (failRadio.checked) human_is_passed = 'fail';

      item.human_is_passed = human_is_passed;

      // 收集所有勾選的理由（不含「其他」checkbox 本身）
      let checkedReasons = Array.from(
        document.querySelectorAll('.reasonOption:checked:not(.reasonOther)')
      ).map(el => el.value);

      // 如果勾選了「其他」並且填了內容 → 加進理由
        const otherChecked = document.querySelector('.reasonOther:checked');
        const otherText = otherReasonInput.value.trim();

        if (otherChecked) {
          // 有勾選其他：如果有文字就加上「其他：內容」，沒有就先記錄「其他」
          if (otherText) {
            checkedReasons.push("其他：" + otherText);
          } else {
            checkedReasons.push("其他");
          }
        }

      // 多項理由串成一段文字，用 "；" 分隔
      item.human_reason = checkedReasons.join('；');
      item.reviewer_name = reviewerInput.value.trim();

      if (human_is_passed && item.human_reason && item.reviewer_name) {
        const now = new Date();
        item.review_date = now.toISOString().slice(0, 10); // YYYY-MM-DD
      } else {
        if (!item.review_date) item.review_date = null;
      }
    }

    // ====== 依目前索引顯示資料 ======
    function renderCurrentRecord() {
      if (!data || data.length === 0) return;
      isRendering = true;

      const item = data[currentIndex];

      // 案件資訊
      const caseId =
        (item.applicantStdn ? item.applicantStdn : '') +
        (item.applicantNo !== undefined && item.applicantNo !== null ? `-${item.applicantNo}` : '');

      caseTitle.textContent = `案件資訊 - #${caseId || '-'}`;
      caseIdText.textContent = caseId || '-';
      fileNameText.textContent = item.file_name ?? '-';
      courseNameText.textContent = item.course_name ?? '-';
      hoursScoreText.textContent = `${item.hours ?? '-'} 小時 / 成績 ${item.score ?? '-'} 分`;

      // AI 判定
      const aiPassed = item.ai_is_passed === true || item.ai_is_passed === 'true';
      aiResultText.innerHTML = aiPassed
        ? `<span class="badge badge-ai-pass">AI：通過</span>`
        : `<span class="badge badge-ai-fail">AI：不通過</span>`;
      aiFeedbackText.textContent = item.ai_feedback ?? '-';

      // 標記狀態
      if (isLabeled(item)) {
        labelStatus.textContent = item.human_is_passed === 'pass' ? '已標記：通過' : '已標記：不通過';
        labelStatus.className = 'badge ' + (item.human_is_passed === 'pass' ? 'badge-ai-pass' : 'badge-ai-fail');
      } else {
        labelStatus.textContent = '尚未標記';
        labelStatus.className = 'badge badge-unlabeled';
      }

      if (item.pdf_path) {
        // 透過 URL 相對目前頁面組出完整連結，避免 file:// 相對路徑判斷錯誤
        const href = item.pdf_path.match(/^https?:|^file:/i)
          ? item.pdf_path
          : new URL(item.pdf_path, window.location.href).toString();
        openPdfBtn.href = href;
        openPdfBtn.target = "_blank";
        openPdfBtn.rel = "noopener";
        openPdfBtn.classList.remove('disabled');
        openPdfBtn.title = href;
        openPdfBtn.textContent = "開啟 PDF";
        console.log("PDF link:", href);
      } else {
        openPdfBtn.href = "javascript:void(0)";
        openPdfBtn.removeAttribute('target');
        openPdfBtn.classList.add('disabled');
        openPdfBtn.title = "此案件沒有可用的 PDF 檔";
        openPdfBtn.textContent = "開啟 PDF";
      }

      // radio 按鈕狀態
      const passRadio = chipPass.querySelector('input');
      const failRadio = chipFail.querySelector('input');
      passRadio.checked = item.human_is_passed === 'pass';
      failRadio.checked = item.human_is_passed === 'fail';

      chipPass.classList.toggle('selected', passRadio.checked);
      chipFail.classList.toggle('selected', failRadio.checked);

      reviewerInput.value = item.reviewer_name ?? '';

            document.querySelectorAll('.reasonOption').forEach(cb => {
        if (cb.classList.contains('reasonOther')) {
          // 「其他」checkbox：human_reason 裡有「其他」或「其他：」都算有勾
          cb.checked = item.human_reason && (
            item.human_reason.includes("其他：") || item.human_reason.includes("其他")
          );
        } else {
          cb.checked = item.human_reason && item.human_reason.includes(cb.value);
        }
      });

      // 恢復「其他」輸入框內容
      if (item.human_reason && (item.human_reason.includes("其他：") || item.human_reason.includes("其他"))) {
        const match = item.human_reason.match(/其他：(.*?)(；|$)/);
        otherReasonInput.value = match ? match[1] : '';
        otherReasonInput.style.display = "block";
      } else {
        otherReasonInput.value = "";
        otherReasonInput.style.display = "none";
      }

      // 進度條 & 索引文字
      const total = data.length;
      const labeledNum = countLabeled();
      const percent = total === 0 ? 0 : Math.round((labeledNum / total) * 100);
      progressFill.style.width = percent + '%';
      recordIndexText.textContent = `第 ${currentIndex + 1} / ${total} 筆`;
      labeledCountText.textContent = `已標記 ${labeledNum} 筆（${percent}％）`;

      // 上一筆 / 下一筆按鈕狀態
      prevBtn.disabled = (getPrevIndex(currentIndex) === null);
      nextBtn.disabled = (getNextIndex(currentIndex) === null);

      isRendering = false;

      // 重新綁定 checkbox 事件
      bindCheckboxEvents();
    }

    // ====== 找下一個 / 上一個索引（考慮只看未標記） ======
    function getNextIndex(fromIndex) {
      if (!data || data.length === 0) return null;
      for (let i = fromIndex + 1; i < data.length; i++) {
        if (!skipLabeledOnly || !isLabeled(data[i])) {
          return i;
        }
      }
      return null;
    }

    function getPrevIndex(fromIndex) {
      if (!data || data.length === 0) return null;
      for (let i = fromIndex - 1; i >= 0; i--) {
        if (!skipLabeledOnly || !isLabeled(data[i])) {
          return i;
        }
      }
      return null;
    }

    // ====== 事件綁定 ======
    // 為每個 checkbox 單獨綁定 change 事件（避免委托監聽失效）
    function bindCheckboxEvents() {
      document.querySelectorAll('.reasonOption').forEach(checkbox => {
        // 移除舊的監聽器避免重複綁定
        checkbox.removeEventListener('change', handleCheckboxChange);
        // 添加新的監聽器
        checkbox.addEventListener('change', handleCheckboxChange);
      });
    }

    function handleCheckboxChange(e) {
      const checkbox = e.target;

      // 如果是「其他」checkbox，控制顯示/隱藏輸入框
      if (checkbox.classList.contains('reasonOther')) {
        if (checkbox.checked) {
          otherReasonInput.style.display = "block";
          otherReasonInput.focus();
        } else {
          otherReasonInput.style.display = "none";
          otherReasonInput.value = "";
        }
      }

      saveCurrentForm();
      renderCurrentRecord();
    }

    // 初始綁定 checkbox 事件
    bindCheckboxEvents();

    // 「其他」輸入框：輸入時寫回資料
    otherReasonInput.addEventListener('input', () => {
      saveCurrentForm();
      renderCurrentRecord();
    });

    // 點擊 radio chip：通過 / 不通過
    chipPass.addEventListener('click', () => {
      const passRadio = chipPass.querySelector('input');
      passRadio.checked = true;
      chipPass.classList.add('selected');
      chipFail.classList.remove('selected');
      saveCurrentForm();
      renderCurrentRecord();
    });

    chipFail.addEventListener('click', () => {
      const failRadio = chipFail.querySelector('input');
      failRadio.checked = true;
      chipFail.classList.add('selected');
      chipPass.classList.remove('selected');
      saveCurrentForm();
      renderCurrentRecord();
    });

    // 標記人輸入
    reviewerInput.addEventListener('input', () => {
      saveCurrentForm();
      renderCurrentRecord();
    });

    // 只瀏覽未標記
    skipLabeledCheckbox.addEventListener('change', (e) => {
      skipLabeledOnly = e.target.checked;
      if (!data || data.length === 0) return;
      if (!skipLabeledOnly || !isLabeled(data[currentIndex])) {
        renderCurrentRecord();
        return;
      }
      // 先找往後，再找往前
      let idx = getNextIndex(currentIndex);
      if (idx === null) idx = getPrevIndex(currentIndex);
      if (idx !== null) {
        currentIndex = idx;
        renderCurrentRecord();
      } else {
        alert('目前沒有尚未標記的案件。');
      }
    });

    // 上一筆 / 下一筆
    prevBtn.addEventListener('click', () => {
      saveCurrentForm();
      const idx = getPrevIndex(currentIndex);
      if (idx !== null) {
        currentIndex = idx;
        renderCurrentRecord();
      }
    });

    nextBtn.addEventListener('click', () => {
      saveCurrentForm();
      const idx = getNextIndex(currentIndex);
      if (idx !== null) {
        currentIndex = idx;
        renderCurrentRecord();
      }
    });

    // 清除此筆標記
    clearCurrentBtn.addEventListener('click', () => {
      if (!data || data.length === 0) return;
      if (!confirm('確定要清除此筆的人工標記嗎？')) return;

      const item = data[currentIndex];
      item.human_is_passed = null;
      item.human_reason = '';
      item.reviewer_name = '';
      item.review_date = null;

      reviewerInput.value = '';
      chipPass.querySelector('input').checked = false;
      chipFail.querySelector('input').checked = false;
      chipPass.classList.remove('selected');
      chipFail.classList.remove('selected');

      document.querySelectorAll('.reasonOption').forEach(cb => cb.checked = false);
      otherReasonInput.value = "";
      otherReasonInput.style.display = "none";

      renderCurrentRecord();
    });

    // 匯出 JSON
    exportJsonBtn.addEventListener('click', () => {
      if (!data || data.length === 0) return;
      saveCurrentForm();

      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = 'labeled_result.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      URL.revokeObjectURL(url);
    });

    // 匯出 CSV
    exportCsvBtn.addEventListener('click', () => {
      if (!data || data.length === 0) return;
      saveCurrentForm();

      const headers = [
        'case_id',
        'file_name',
        'course_name',
        'hours',
        'score',
        'ai_is_passed',
        'ai_feedback',
        'human_is_passed',
        'human_reason',
        'reviewer_name',
        'review_date'
      ];

      const lines = [];
      lines.push(headers.join(','));

      data.forEach((item) => {
        const row = headers.map((h) => {
          let value = item[h] ?? '';
          if (typeof value === 'boolean') value = value ? 'true' : 'false';
          if (typeof value === 'string') {
            const escaped = value.replace(/"/g, '""');
            return `"${escaped}"`;
          }
          return value;
        });
        lines.push(row.join(','));
      });

      const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'labeled_result.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
