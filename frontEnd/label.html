<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>審核系統｜人工標記</title>

  <!-- 先套用主系統樣式，再加上標記頁專用樣式 -->
  <link rel="stylesheet" href="review.css">
  <link rel="stylesheet" href="label.css">
</head>
<body>

  <!-- 簡化版上方列，沿用主系統樣式 -->
  <header class="appbar" role="banner">
    <div class="brand">
      <span class="brand-badge" aria-hidden="true"></span>
      <h1>智慧審核平台</h1>
    </div>
    <div class="appbar-actions">
      <a href="index.html#reward" class="chip">← 回磨課師審核</a>
    </div>
  </header>

  <main class="container label-container" role="main">
    <section class="section-hd">
      <h3>人工標記與修正</h3>
      <p class="muted">
        依序載入歷史案件，勾選 AI 判定是否正確，必要時填寫修正後的結果與備註，
        用來累積未來優化模型的訓練資料。
      </p>
    </section>

    <div class="label-layout">
      <!-- 左側：案件資訊 + AI 審核結果 -->
      <article class="card">
        <div class="card-hd">案件資訊與 AI 審核</div>
        <div class="card-bd">
          <div class="label-meta">
            <div class="meta-row">
              <span class="meta-label">申請人學號</span>
              <span class="meta-value" id="applicantStdn">尚未載入</span>
            </div>
            <div class="meta-row">
              <span class="meta-label">申請人姓名</span>
              <span class="meta-value" id="applicantName">尚未載入</span>
            </div>
            <div class="meta-row">
              <span class="meta-label">申請編號</span>
              <span class="meta-value" id="applicantNo">尚未載入</span>
            </div>
            <div class="meta-row">
              <span class="meta-label">申請時間</span>
              <span class="meta-value" id="applyDateTime">尚未載入</span>
            </div>

            <div class="meta-row">
              <span class="meta-label">AI 判定結果</span>
              <!-- 這裡會由 JS 加上 pill 樣式 -->
              <span class="meta-value">
                <span id="aiIsPassed" class="pill">尚未載入</span>
              </span>
            </div>
          </div>

          <div class="ai-box">
            <div class="ai-box-hd">
              <strong>AI 審核說明</strong>
            </div>
            <pre id="aiFeedback" class="ai-box-body">(尚未載入)</pre>
          </div>

          <div class="hint">
            若 AI 回應看起來怪怪的，右側可直接填寫「修正後是否通過」與「修正說明」。
          </div>
        </div>
      </article>

      <!-- 右側：人工標記區 -->
      <article class="card">
        <div class="card-hd">人工標記與修正</div>
        <div class="card-bd">
          <div class="form label-form">
            <label class="field field-inline">
              <span class="lbl">AI 判定是否正確</span>
              <span class="choice">
                <input type="checkbox" id="labelIsCorrect">
                <span>AI 整體判定正確（不需修正）</span>
              </span>
            </label>

            <label class="field">
              <span class="lbl">修正後是否通過（選填）</span>
              <select id="correctedIsPassed">
                <option value="">不修正</option>
                <option value="true">通過</option>
                <option value="false">不通過</option>
              </select>
            </label>

            <label class="field">
              <span class="lbl">修正後審核意見（選填）</span>
              <textarea id="correctedFeedback"
                placeholder="例：實際總時數符合規定，AI 少抓一門課，已修正為通過。"></textarea>
            </label>

            <label class="field">
              <span class="lbl">備註給開發者（選填）</span>
              <textarea id="reviewComment"
                placeholder="例：哪一題常判錯、哪些格式容易誤判，方便之後改規則或訓練。"></textarea>
            </label>

            <div class="actions label-actions">
              <button id="btnLoad" type="button" class="btn ghost">載入下一筆</button>
              <button id="btnSave" type="button" class="btn primary">儲存標記</button>
            </div>

            <p class="muted tiny">
              提醒：按下「儲存標記」後，系統會自動載入下一筆尚未標記的案件。
            </p>
          </div>
        </div>
      </article>
    </div>
  </main>

  <script src="label.js"></script>
</body>
</html>
