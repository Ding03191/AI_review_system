<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="api-base" content="http://127.0.0.1:5000">
  <title>Login | System</title>
  <link rel="stylesheet" href="../src/css/review.css">
</head>
<body class="auth-page">
  <main class="auth-wrap">
    <div class="auth-logo">
      <div class="logo-mark"></div>
      <div class="logo-text">Review</div>
    </div>

    <section class="auth-card-simple">
      <button class="btn ghost full" type="button" id="btnGoogleLogin">Sign in with Google</button>

      <div class="auth-field">
        <label>Student ID</label>
        <input form="formLogin" type="text" name="studentId" required>
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input form="formLogin" id="loginPwd" type="password" name="password" minlength="6" required>
      </div>

      <label class="auth-check">
        <input type="checkbox" form="formLogin"> Keep me signed in
      </label>

      <div id="loginError" class="auth-error"></div>

      <form id="formLogin">
        <button type="submit" class="btn primary full">Login</button>
      </form>

      <div class="auth-foot">
        No account? <a href="register.html">Register</a>
      </div>
    </section>
  </main>

  <footer class="auth-footer">Copyright ? 2026</footer>

  <script src="../src/js/auth.js"></script>
</body>
</html>
