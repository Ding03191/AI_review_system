<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="api-base" content="http://127.0.0.1:5002">
  <title>登入 | AI 審核平台</title>
  <link rel="stylesheet" href="../src/css/login.css">
</head>
<body class="auth-page">
  <main class="auth-wrap">
    <div class="auth-logo">
      <div class="logo-mark"></div>
      <div class="logo-text">AI 審核平台</div>
    </div>

    <section class="auth-card-simple">
      <button class="btn ghost full" type="button" id="btnGoogleLogin">使用 Google 登入</button>

      <form id="formLogin">
        <div class="auth-field">
          <label>學號</label>
          <input type="text" name="studentId" required>
        </div>
        <div class="auth-field">
          <label>密碼</label>
          <input id="loginPwd" type="password" name="password" minlength="6" required>
        </div>

        <label class="auth-check">
          <input type="checkbox"> 保持登入
        </label>

        <div id="loginError" class="auth-error"></div>

        <button type="submit" class="btn primary full">登入</button>
      </form>

      <div class="auth-foot">
        沒有帳號，請註冊 <a href="register.html">註冊</a>
      </div>
    </section>
  </main>

  <footer class="auth-footer">Copyright 2026</footer>

  <script src="../src/js/auth.js"></script>
</body>
</html>
