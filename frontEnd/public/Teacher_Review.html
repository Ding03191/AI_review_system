<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="api-base" content="http://127.0.0.1:5002">
  <title>老師審核 | AI 審核平台</title>
  <link rel="stylesheet" href="../src/css/Teacher_Review.css">
</head>
<body class="page-shell role-pending" data-page="label">
  <header class="topbar" role="banner">
    <div class="brand">
      <span class="brand-badge" aria-hidden="true"></span>
      <div class="brand-title">AI 審核平台</div>
    </div>
    <div class="user-actions">
      <button class="avatar-btn" id="userMenuBtn" aria-haspopup="true" aria-expanded="false" data-user-initial>U</button>
      <button class="gear-btn" id="userMenuGear" aria-label="使用者選單">...</button>
    </div>
  </header>

  <main class="layout" role="main">
    <aside class="sidebar">
      <div class="nav-title">審核</div>
      <a class="nav-item" href="review.html">自評</a>
      <a class="nav-item" href="history.html">歷史紀錄</a>
      <a class="nav-item active is-hidden" href="Teacher_Review.html" data-role="teacher" style="display:none">老師審核</a>
    </aside>

    <section class="main">
      <div class="section-hd">
        <h3>老師審核</h3>
        <p class="muted">檢視學生提交並匯出結果。</p>
      </div>

      <article class="card">
        <div class="card-hd">
          <div class="tabs">
            <button id="tabUnlabeled" class="tab active" type="button">待審核</button>
            <button id="tabLabeled" class="tab" type="button">已提交</button>
          </div>
          <div class="actions">
            <button id="btnReloadLabel" class="btn ghost" type="button">重新載入</button>
            <button id="btnExportLabel" class="btn primary" type="button">匯出 Excel</button>
          </div>
        </div>
        <div class="card-bd">
          <div id="panelUnlabeled">
            <div id="unlabeledEmpty" class="empty">沒有待審核的資料。</div>
            <div id="unlabeledList" class="label-list"></div>
          </div>
          <div id="panelLabeled" class="is-hidden">
            <div id="labeledEmpty" class="empty">沒有已提交的資料。</div>
            <div id="labeledList" class="label-list"></div>
          </div>
        </div>
      </article>
    </section>
  </main>

  <div class="menu-panel" id="userMenuPanel" aria-hidden="true">
      <div class="menu-head">
        <div class="menu-name" data-user-name>使用者</div>
        <div class="menu-sub" data-user-student></div>
      </div>
      <a class="menu-item" href="review.html">自評</a>
      <a class="menu-item" href="history.html">歷史紀錄</a>
      <a class="menu-item is-hidden" href="Teacher_Review.html" data-role="teacher" style="display:none">老師審核</a>
      <button class="menu-item danger" type="button" id="btnLogout">登出</button>
  </div>

  <footer class="app-footer">AI 審核平台</footer>

  <script src="../src/js/Teacher_Review.js" defer></script>
  <script src="../src/js/layout.js" defer></script>
</body>
</html>
