<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="api-base" content="http://127.0.0.1:5002">
  <title>Review | History</title>
  <link rel="stylesheet" href="../src/css/review.css">
</head>
<body class="page-shell" data-page="history">
  <header class="topbar" role="banner">
    <div class="brand">
      <span class="brand-badge" aria-hidden="true"></span>
      <div class="brand-title">Review</div>
    </div>
    <div class="user-actions">
      <button class="avatar-btn" id="userMenuBtn" aria-haspopup="true" aria-expanded="false" data-user-initial>U</button>
      <button class="gear-btn" id="userMenuGear" aria-label="User Menu">...</button>
    </div>
  </header>

  <main class="layout" role="main">
    <aside class="sidebar">
      <div class="nav-title">Review</div>
      <a class="nav-item" href="review.html">Submit</a>
      <a class="nav-item active" href="history.html">History</a>
      <a class="nav-item" href="label.html" data-role="teacher">Teacher Review</a>
    </aside>

    <section class="main">
      <div class="section-hd">
        <h3>History</h3>
        <p class="muted">Search by time, student ID, or name.</p>
      </div>

      <article class="card">
        <div class="card-hd">Filters</div>
        <div class="card-bd">
          <form id="recordQueryForm" class="form filter-stack">
            <label class="field">
              <span class="lbl">Time</span>
              <input id="recordTime" placeholder="YYYY-MM-DD or HH:MM">
            </label>
            <label class="field">
              <span class="lbl">Student ID</span>
              <input id="recordStudentId">
            </label>
            <label class="field">
              <span class="lbl">Name</span>
              <input id="recordName">
            </label>
            <div class="actions end">
              <button class="btn primary" type="submit">Search</button>
            </div>
          </form>
        </div>
      </article>

      <article class="card">
        <div class="card-hd">Records</div>
        <div class="card-bd">
          <div class="table-wrap">
            <table class="table compact" id="historyTable">
              <thead>
                <tr>
                  <th>Time</th>
                  <th>Student ID</th>
                  <th>Name</th>
                  <th>Feedback</th>
                </tr>
              </thead>
              <tbody id="recordList">
                <tr><td colspan="4" class="empty">No data</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </article>
    </section>
  </main>

  <div class="menu-panel" id="userMenuPanel" aria-hidden="true">
      <div class="menu-head">
        <div class="menu-name" data-user-name>Student</div>
        <div class="menu-sub" data-user-student>Student ID</div>
      </div>
      <a class="menu-item" href="review.html">Profile</a>
      <a class="menu-item" href="history.html">History</a>
      <a class="menu-item" href="label.html" data-role="teacher">Teacher Review</a>
      <button class="menu-item danger" type="button" id="btnLogout">Logout</button>
  </div>

  <footer class="app-footer">AI Review Platform</footer>

  <script src="../src/js/history.js" defer></script>
  <script src="../src/js/layout.js" defer></script>
</body>
</html>
