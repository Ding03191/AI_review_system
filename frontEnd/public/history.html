<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="api-base" content="http://127.0.0.1:5000">
  <title>歷史紀錄查詢｜審核系統</title>
  <link rel="stylesheet" href="../src/css/review.css">
  <link rel="stylesheet" href="../src/css/history.css">
</head>
<body>
  <header class="appbar" role="banner">
    <a class="icon-btn" href="index.html" aria-label="返回首頁">
      <span class="bar"></span><span class="bar"></span><span class="bar"></span>
    </a>
    <div class="brand">
      <span class="brand-badge" aria-hidden="true"></span>
      <h1>歷史紀錄</h1>
    </div>
  </header>

  <main class="container" role="main">
    <section class="page">
      <div class="section-hd">
        <h3>歷史紀錄查詢</h3>
        <p class="muted">依日期查詢當日申請摘要與明細</p>
      </div>

      <article class="card">
        <div class="card-hd">查詢條件</div>
        <div class="card-bd">
          <form id="recordQueryForm" class="form">
            <div class="grid g-2">
              <label class="field">
                <span class="lbl req">日期</span>
                <input id="recordDate" name="recordDate" type="date" required>
              </label>
              <div class="field">
                <span class="lbl">&nbsp;</span>
                <button class="btn primary" type="submit">查詢</button>
              </div>
            </div>
          </form>

          <div id="recordSummary" class="records-summary" aria-live="polite">
            <div class="summary-item"><span class="k">總數</span><span class="v" id="summaryTotal">-</span></div>
            <div class="summary-item"><span class="k">通過</span><span class="v" id="summaryPassed">-</span></div>
            <div class="summary-item"><span class="k">未通過</span><span class="v" id="summaryFailed">-</span></div>
          </div>

          <div class="records-table-wrap">
            <table class="records-table">
              <thead>
                <tr>
                  <th>申請時間</th>
                  <th>申請人</th>
                  <th>案件編號</th>
                  <th>學號</th>
                  <th>結果</th>
                  <th>AI 回饋</th>
                  <th>檔案</th>
                </tr>
              </thead>
              <tbody id="recordList">
                <tr>
                  <td class="empty" colspan="7">請選擇日期後查詢</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </article>
    </section>
  </main>

  <script src="../src/js/history.js" defer></script>
</body>
</html>
