<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="api-base" content="http://127.0.0.1:5000">
  <title>Review</title>
  <link rel="stylesheet" href="../src/css/review.css">
</head>
<body class="page-shell" data-page="review">
  <header class="topbar" role="banner">
    <div class="brand">
      <span class="brand-badge" aria-hidden="true"></span>
      <div class="brand-title">Review</div>
    </div>
    <div class="user-actions">
      <button class="avatar-btn" id="userMenuBtn" aria-haspopup="true" aria-expanded="false" data-user-initial>U</button>
      <button class="gear-btn" id="userMenuGear" aria-label="User Menu">...</button>
    </div>
  </header>

  <main class="layout" role="main">
    <aside class="sidebar">
      <div class="nav-title">Review</div>
      <a class="nav-item active" href="review.html">Submit</a>
      <a class="nav-item" href="history.html">History</a>
      <a class="nav-item" href="label.html" data-role="teacher">Teacher Review</a>
    </aside>

    <section class="main">
      <div class="section-hd">
        <h3>Submit Application</h3>
        <p class="muted">Fill the form and upload the file.</p>
      </div>

      <div class="content-grid">
          <article class="card">
            <div class="card-hd">Application</div>
            <div class="card-bd">
              <form id="reviewForm" class="form">
                <div class="grid g-2">
                  <label class="field">
                    <span class="lbl req">Case No</span>
                    <input name="caseNo" required>
                  </label>
                  <label class="field">
                    <span class="lbl req">Name</span>
                    <input name="name" required>
                  </label>
                  <label class="field">
                    <span class="lbl req">Student ID</span>
                    <input name="studentId" required>
                  </label>
                  <label class="field">
                    <span class="lbl req">File</span>
                    <input type="file" name="file" accept=".pdf,.doc,.docx" required>
                  </label>
                </div>

                <div class="actions">
                  <button class="btn primary" type="submit">Submit</button>
                </div>
              </form>
            </div>
          </article>

          <article class="card side-fill">
            <div class="card-hd">Result</div>
            <div class="card-bd">
              <div id="reviewResult" class="kbd fillbox">Result will show here after submit.</div>
            </div>
          </article>
        </div>
    </section>
  </main>

  <div class="menu-panel" id="userMenuPanel" aria-hidden="true">
      <div class="menu-head">
        <div class="menu-name" data-user-name>Student</div>
        <div class="menu-sub" data-user-student>Student ID</div>
      </div>
      <a class="menu-item" href="review.html">Profile</a>
      <a class="menu-item" href="history.html">History</a>
      <a class="menu-item" href="label.html" data-role="teacher">Teacher Review</a>
      <button class="menu-item danger" type="button" id="btnLogout">Logout</button>
  </div>

  <footer class="app-footer">AI Review</footer>

  <script src="../src/js/review.js" defer></script>
  <script src="../src/js/layout.js" defer></script>
  <script src="../src/js/assistant.js" defer></script>
</body>
</html>
