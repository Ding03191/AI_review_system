<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="api-base" content="http://127.0.0.1:5002">
  <title>Register | System</title>
  <link rel="stylesheet" href="../src/css/review.css">
</head>
<body class="auth-page">
  <main class="auth-wrap">
    <div class="auth-logo">
      <div class="logo-mark"></div>
      <div class="logo-text">Review</div>
    </div>

    <section class="auth-card-simple">
      <div class="auth-title">Create Account</div>

      <div class="auth-field">
        <label>Name</label>
        <input form="formRegister" type="text" name="name" required>
      </div>
      <div class="auth-field">
        <label>Student ID</label>
        <input form="formRegister" type="text" name="studentId" required>
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input form="formRegister" id="registerPwd" type="password" name="password" minlength="6" required>
      </div>

      <div id="registerError" class="auth-error"></div>

      <form id="formRegister">
        <button type="submit" class="btn primary full">Register</button>
      </form>

      <div class="auth-foot">
        <a href="login.html">Back to login</a>
      </div>
    </section>
  </main>

  <footer class="auth-footer">Copyright 2026</footer>

  <script src="../src/js/auth.js"></script>
</body>
</html>
